<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NimbusDrive — Shared File</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        :root {
            --color-bg: #f8fafc;
            --color-navy: #1a2b4a;
            --color-accent: #2563eb;
            --color-muted: #64748b;
            --color-border: rgba(148, 163, 184, 0.35);
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.12), 0 0 0 1px rgba(148, 163, 184, 0.22);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Sora", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: var(--color-bg);
            color: var(--color-navy);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 28px;
            border: 1px solid rgba(226, 232, 240, 0.9);
        }

        .top {
            display: flex;
            gap: 14px;
            align-items: center;
            margin-bottom: 18px;
        }

        .icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: rgba(37, 99, 235, 0.10);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        h1 {
            margin: 0;
            font-size: 1.25rem;
            line-height: 1.3;
            font-weight: 700;
            color: var(--color-navy);
            word-break: break-word;
        }

        .meta {
            margin-top: 4px;
            color: var(--color-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .rows {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid rgba(226, 232, 240, 0.9);
        }

        .row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 14px;
            font-size: 0.92rem;
        }

        .row .label {
            color: var(--color-muted);
            font-weight: 600;
        }

        .row .value {
            font-weight: 600;
            text-align: right;
            color: var(--color-navy);
            word-break: break-word;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid transparent;
            background: var(--color-accent);
            color: #ffffff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 12px 22px rgba(37, 99, 235, 0.25);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 16px 28px rgba(37, 99, 235, 0.28); }
        .btn:disabled { cursor: not-allowed; opacity: 0.65; transform: none; box-shadow: none; }

        .btn-secondary {
            background: #ffffff;
            color: var(--color-navy);
            border-color: var(--color-border);
            box-shadow: none;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.10), 0 0 0 1px rgba(148, 163, 184, 0.22);
        }

        .status {
            margin-top: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--color-muted);
        }

        .error {
            color: #b91c1c;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 999px;
            border: 2px solid rgba(37, 99, 235, 0.25);
            border-top-color: var(--color-accent);
            animation: spin 0.8s linear infinite;
            vertical-align: -2px;
            margin-right: 8px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
<div class="card" id="card">
    <div class="top">
        <div class="icon" id="fileIcon">📦</div>
        <div>
            <h1 id="title">Loading…</h1>
            <div class="meta" id="subtitle">Fetching share info</div>
        </div>
    </div>

    <div class="rows" id="rows" style="display:none;">
        <div class="row"><span class="label">Shared by</span><span class="value" id="sharedBy">—</span></div>
        <div class="row"><span class="label">Expires</span><span class="value" id="expiresAt">—</span></div>
        <div class="row"><span class="label">File size</span><span class="value" id="fileSize">—</span></div>
    </div>

    <div class="actions" id="actions" style="display:none;"></div>

    <div class="status" id="status"><span class="spinner"></span>Loading…</div>
</div>

<script>
    const token = new URLSearchParams(window.location.search).get('token');

    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const statusEl = document.getElementById('status');
    const rowsEl = document.getElementById('rows');
    const actionsEl = document.getElementById('actions');
    const sharedByEl = document.getElementById('sharedBy');
    const expiresAtEl = document.getElementById('expiresAt');
    const fileSizeEl = document.getElementById('fileSize');
    const fileIconEl = document.getElementById('fileIcon');

    function setLoading(isLoading, message) {
        if (isLoading) {
            statusEl.innerHTML = '<span class="spinner"></span>' + (message || 'Loading…');
            statusEl.classList.remove('error');
        } else {
            statusEl.textContent = message || '';
        }
        statusEl.style.display = (isLoading || (message && message.length > 0)) ? 'block' : 'none';
    }

    function showError(title, message) {
        titleEl.textContent = title;
        subtitleEl.textContent = '';
        rowsEl.style.display = 'none';
        actionsEl.style.display = 'none';
        fileIconEl.textContent = '⚠️';
        statusEl.textContent = message || '';
        statusEl.classList.add('error');
        statusEl.style.display = message ? 'block' : 'none';
    }

    function formatSize(bytes) {
        if (bytes == null || Number.isNaN(Number(bytes))) return '—';
        const b = Number(bytes);
        if (b < 1024) return b + ' B';
        const kb = b / 1024;
        if (kb < 1024) return kb.toFixed(1).replace(/\.0$/, '') + ' KB';
        const mb = kb / 1024;
        return mb.toFixed(1).replace(/\.0$/, '') + ' MB';
    }

    function getIcon(fileName) {
        const name = (fileName || '').toLowerCase();
        if (name.endsWith('.pdf')) return '📄';
        if (name.endsWith('.png') || name.endsWith('.jpg') || name.endsWith('.jpeg') || name.endsWith('.gif') || name.endsWith('.webp')) return '🖼️';
        if (name.endsWith('.txt')) return '📝';
        return '📦';
    }

    function parseFilenameFromContentDisposition(contentDisposition) {
        if (!contentDisposition) return null;
        const match = contentDisposition.match(/filename\s*=\s*"([^"]+)"/i);
        return match ? match[1] : null;
    }

    async function safeReadText(response) {
        try {
            return await response.text();
        } catch {
            return '';
        }
    }

    async function handlePreview() {
        try {
            setLoading(true, 'Opening preview…');
            const response = await fetch('/api/share/' + encodeURIComponent(token) + '/preview');
            if (!response.ok) {
                const msg = await safeReadText(response);
                throw new Error(msg || 'Failed to preview file');
            }
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl);
            setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
            setLoading(false, '');
        } catch (e) {
            setLoading(false, '');
            statusEl.textContent = (e && e.message) ? e.message : 'Failed to preview file';
            statusEl.classList.add('error');
            statusEl.style.display = 'block';
        }
    }

    async function handleDownload() {
        try {
            setLoading(true, 'Downloading…');
            const response = await fetch('/api/share/' + encodeURIComponent(token) + '/download');
            if (!response.ok) {
                const msg = await safeReadText(response);
                throw new Error(msg || 'Failed to download file');
            }
            const blob = await response.blob();
            const disposition = response.headers.get('Content-Disposition');
            const filename = parseFilenameFromContentDisposition(disposition) || 'download';

            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();

            setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
            setLoading(false, '');
        } catch (e) {
            setLoading(false, '');
            statusEl.textContent = (e && e.message) ? e.message : 'Failed to download file';
            statusEl.classList.add('error');
            statusEl.style.display = 'block';
        }
    }

    async function init() {
        if (!token || token.trim().length === 0) {
            showError('Invalid share link', '');
            return;
        }

        setLoading(true, 'Fetching share info…');
        titleEl.textContent = 'Loading…';
        subtitleEl.textContent = 'Fetching share info';

        const response = await fetch('/api/share/' + encodeURIComponent(token) + '/info');

        if (response.status === 404) {
            showError('This share link does not exist.', '');
            return;
        }

        if (response.status === 410) {
            let msg = 'This share link is no longer available.';
            try {
                const data = await response.json();
                if (data && (data.message || data.error || data.reason)) {
                    msg = data.message;
                }
            } catch {
                // ignore
            }
            showError('Share link expired or revoked', msg);
            return;
        }

        if (!response.ok) {
            const msg = await safeReadText(response);
            showError('Unable to load share', msg || 'Please try again later.');
            return;
        }

        const info = await response.json();

        const fileName = info.fileName;
        const sharedBy = info.sharedBy;
        const expiresAt = info.expiresAt;
        const previewable = !!info.previewable;
        const fileSize = info.fileSize;

        fileIconEl.textContent = getIcon(fileName);
        titleEl.textContent = fileName || 'Shared file';
        subtitleEl.textContent = 'NimbusDrive public share';

        sharedByEl.textContent = sharedBy || '—';
        expiresAtEl.textContent = (expiresAt == null) ? 'No expiry' : ('Expires: ' + new Date(expiresAt).toLocaleString());
        fileSizeEl.textContent = formatSize(fileSize);

        rowsEl.style.display = 'grid';

        actionsEl.innerHTML = '';
        if (previewable) {
            const previewBtn = document.createElement('button');
            previewBtn.type = 'button';
            previewBtn.className = 'btn btn-secondary';
            previewBtn.textContent = 'Preview';
            previewBtn.addEventListener('click', handlePreview);
            actionsEl.appendChild(previewBtn);
        }

        const downloadBtn = document.createElement('button');
        downloadBtn.type = 'button';
        downloadBtn.className = 'btn';
        downloadBtn.textContent = 'Download';
        downloadBtn.addEventListener('click', handleDownload);
        actionsEl.appendChild(downloadBtn);

        actionsEl.style.display = 'grid';
        setLoading(false, '');
    }

    init();
</script>
</body>
</html>
